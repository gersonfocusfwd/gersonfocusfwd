<svg width="1000" height="400" viewBox="0 0 1000 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo Espacial Oscuro -->
  <rect width="1000" height="400" fill="#020205"/>
  
  <!-- Estrellas/Partículas de fondo -->
  <g>
    <circle cx="100" cy="50" r="1" fill="#50C878" opacity="0.3">
        <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="300" r="1" fill="#50C878" opacity="0.2">
        <animate attributeName="opacity" values="0.1;0.4;0.1" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="300" cy="250" r="1.2" fill="#50C878" opacity="0.4">
        <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="100" r="1" fill="#50C878" opacity="0.1">
        <animate attributeName="opacity" values="0.1;0.3;0.1" dur="6s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Círculos del Radar -->
  <circle cx="500" cy="200" r="50" stroke="#50C878" stroke-width="0.5" stroke-opacity="0.2" />
  <circle cx="500" cy="200" r="100" stroke="#50C878" stroke-width="0.5" stroke-opacity="0.15" />
  <circle cx="500" cy="200" r="150" stroke="#50C878" stroke-width="0.5" stroke-opacity="0.1" />
  
  <!-- Línea de Escaneo (Radar) -->
  <g>
    <line x1="500" y1="200" x2="500" y2="50" stroke="url(#radarGradient)" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 500 200" to="360 500 200" dur="4s" repeatCount="indefinite" />
    </line>
    <defs>
      <linearGradient id="radarGradient" x1="500" y1="200" x2="500" y2="50" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#50C878" stop-opacity="0"/>
        <stop offset="1" stop-color="#50C878" stop-opacity="1"/>
      </linearGradient>
    </defs>
  </g>

  <!-- Puntos de Datos (Data Points) parpadeantes -->
  <circle cx="460" cy="140" r="2" fill="#50C878">
    <animate attributeName="opacity" values="0.1;1;0.1" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="560" cy="240" r="2.5" fill="#50C878">
    <animate attributeName="opacity" values="0.1;0.8;0.1" dur="1.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="420" cy="220" r="1.5" fill="#50C878">
    <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.2s" repeatCount="indefinite" />
  </circle>

  <!-- Glow Central -->
  <circle cx="500" cy="200" r="10" fill="#50C878" opacity="0.2">
    <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
