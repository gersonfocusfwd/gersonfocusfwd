<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Espacio Profundo -->
  <rect width="1000" height="300" fill="#010103"/>
  
  <!-- Nebulosa Dinámica -->
  <circle cx="200" cy="100" r="200" fill="url(#nebula_p)" opacity="0.15">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="10s" repeatCount="indefinite" />
  </circle>
  <circle cx="800" cy="200" r="250" fill="url(#nebula_b)" opacity="0.1">
    <animate attributeName="opacity" values="0.05;0.15;0.05" dur="15s" repeatCount="indefinite" />
  </circle>

  <defs>
    <radialGradient id="nebula_p" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(200 100) rotate(90) scale(200)">
      <stop offset="0" stop-color="#2D004D" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#010103" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula_b" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 200) rotate(90) scale(250)">
      <stop offset="0" stop-color="#001F3F" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#010103" stop-opacity="0"/>
    </radialGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Partículas Lentas -->
  <g>
    <circle r="0.8" fill="#50C878" opacity="0.8">
      <animate attributeName="cx" from="1100" to="-100" dur="25s" repeatCount="indefinite" begin="0s" />
      <animate attributeName="cy" values="50;60;50" dur="12s" repeatCount="indefinite" />
    </circle>
    <circle r="0.6" fill="#50C878" opacity="0.6">
      <animate attributeName="cx" from="1100" to="-100" dur="30s" repeatCount="indefinite" begin="-5s" />
      <animate attributeName="cy" values="250;240;250" dur="15s" repeatCount="indefinite" />
    </circle>
    <circle r="0.7" fill="#50C878" opacity="0.7">
      <animate attributeName="cx" from="1100" to="-100" dur="28s" repeatCount="indefinite" begin="-12s" />
      <animate attributeName="cy" values="120;140;120" dur="18s" repeatCount="indefinite" />
    </circle>
    <circle r="0.5" fill="#50C878" opacity="0.5">
      <animate attributeName="cx" from="1100" to="-100" dur="35s" repeatCount="indefinite" begin="-18s" />
      <animate attributeName="cy" values="180;170;180" dur="22s" repeatCount="indefinite" />
    </circle>
    <circle r="0.8" fill="#50C878" opacity="0.9">
      <animate attributeName="cx" from="1100" to="-100" dur="22s" repeatCount="indefinite" begin="-8s" />
      <animate attributeName="cy" values="30;45;30" dur="14s" repeatCount="indefinite" />
    </circle>
    <circle r="0.6" fill="#50C878" opacity="0.65">
      <animate attributeName="cx" from="1100" to="-100" dur="32s" repeatCount="indefinite" begin="-22s" />
      <animate attributeName="cy" values="220;235;220" dur="16s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Partículas Medianas con Glow -->
  <g filter="url(#glow)">
    <circle r="1.2" fill="#50C878">
      <animate attributeName="cx" from="1100" to="-100" dur="15s" repeatCount="indefinite" begin="-2s" />
      <animate attributeName="cy" values="100;120;100" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle r="1.5" fill="#50C878">
      <animate attributeName="cx" from="1100" to="-100" dur="18s" repeatCount="indefinite" begin="-10s" />
      <animate attributeName="cy" values="150;130;150" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle r="1.3" fill="#50C878" opacity="0.9">
      <animate attributeName="cx" from="1100" to="-100" dur="16s" repeatCount="indefinite" begin="-6s" />
      <animate attributeName="cy" values="80;95;80" dur="9s" repeatCount="indefinite" />
    </circle>
    <circle r="1.1" fill="#50C878" opacity="0.8">
      <animate attributeName="cx" from="1100" to="-100" dur="20s" repeatCount="indefinite" begin="-14s" />
      <animate attributeName="cy" values="270;255;270" dur="11s" repeatCount="indefinite" />
    </circle>
    <circle r="1.4" fill="#50C878" opacity="0.95">
      <animate attributeName="cx" from="1100" to="-100" dur="14s" repeatCount="indefinite" begin="-12s" />
      <animate attributeName="cy" values="190;210;190" dur="7s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Partículas Rápidas -->
  <g>
    <rect width="10" height="1.5" fill="#50C878" opacity="0.6">
      <animate attributeName="x" from="1100" to="-100" dur="6s" repeatCount="indefinite" begin="-1s" />
      <animate attributeName="y" values="200;205;200" dur="4s" repeatCount="indefinite" />
    </rect>
    <rect width="8" height="1.2" fill="#50C878" opacity="0.5">
      <animate attributeName="x" from="1100" to="-100" dur="8s" repeatCount="indefinite" begin="-3s" />
      <animate attributeName="y" values="70;65;70" dur="5s" repeatCount="indefinite" />
    </rect>
    <rect width="12" height="1.8" fill="#50C878" opacity="0.7">
      <animate attributeName="x" from="1100" to="-100" dur="5s" repeatCount="indefinite" begin="-5s" />
      <animate attributeName="y" values="240;250;240" dur="3s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Cometas -->
  <g>
    <path d="M 0 0 L 50 2" stroke="#50C878" stroke-width="1" opacity="0">
      <animate attributeName="d" values="M 1100 50 L 1150 52; M -200 150 L -150 152" dur="3s" repeatCount="indefinite" begin="7s" />
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="7s" />
    </path>
    <path d="M 0 0 L 40 1.5" stroke="#50C878" stroke-width="0.8" opacity="0">
      <animate attributeName="d" values="M 1100 180 L 1140 181.5; M -200 80 L -160 81.5" dur="4s" repeatCount="indefinite" begin="2s" />
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite" begin="2s" />
    </path>
  </g>

  <!-- Textos -->
  <text x="500" y="140" text-anchor="middle" fill="white" font-family="'Segoe UI', Arial, sans-serif" font-weight="bold" font-size="60" filter="url(#glow)">Gerson Fuentes</text>
  <text x="500" y="190" text-anchor="middle" fill="#00FFCC" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="bold">Full Stack Developer</text>
  <text x="500" y="230" text-anchor="middle" fill="#cccccc" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Desarrollador | Especialista en Frontend y Backend</text>

</svg>
